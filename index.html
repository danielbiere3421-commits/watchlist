<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Watchlist DVD 3D Pro</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #080808;
  color: white;
  overflow: hidden;
  perspective: 1500px;
}

/* TOP BAR */
#topbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.9);
  padding: 12px;
  backdrop-filter: blur(12px);
  z-index: 100;
  border-bottom: 1px solid #111;
}

input {
  width: 65%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  font-size: 16px;
  background: #1c1c1c;
  color: white;
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 25px;
  font-size: 14px;
  cursor: pointer;
}

.search-btn { background: #1db954; color: white; }

.results {
  display: flex;
  overflow-x: auto;
  margin-top: 10px;
}

.results img {
  height: 130px;
  border-radius: 6px;
  margin-right: 10px;
  cursor: pointer;
}

/* TITRE DU FILM */
#movie-title {
  position: fixed;
  top: 140px;
  width: 100%;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 2px;
  z-index: 10;
}

/* CONFIGURATION DU SPECTACLE 3D */
#viewer {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  height: 100vh;
  position: relative;
}

.dvd-container {
  position: absolute;
  width: 220px;
  height: 310px;
  transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
  transform-style: preserve-3d;
  opacity: 0;
  visibility: hidden;
}

.dvd-container.active {
  opacity: 1;
  visibility: visible;
  transform: translate3d(0, 20px, 0);
  z-index: 5;
}

/* Animation de rotation fluide à 360° comme sur ta vidéo */
.dvd-container.active .dvd-box {
  animation: spin3D 14s linear infinite;
}

.dvd-container.active:hover .dvd-box {
  animation-play-state: paused;
}

/* Aperçus sur les côtés */
.dvd-container.prev-slide {
  opacity: 0.25;
  visibility: visible;
  transform: translate3d(-350px, 40px, -200px) rotateY(45deg);
  z-index: 3;
  cursor: pointer;
}

.dvd-container.next-slide {
  opacity: 0.25;
  visibility: visible;
  transform: translate3d(350px, 40px, -200px) rotateY(-45deg);
  z-index: 3;
  cursor: pointer;
}

/* BOÎTIER DVD DOUBLE-FACE + TRANCHE */
.dvd-box {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

.dvd-face {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  box-shadow: 0 10px 25px rgba(0,0,0,0.8);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Face Avant (Jaquette HD) */
.dvd-front {
  width: 100%;
  transform: translateZ(11px); /* Épaisseur du boîtier divisée par 2 */
  border-radius: 0 4px 4px 0;
}
.dvd-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 0 4px 4px 0;
}

/* Face Arrière (Le dos officiel de la jaquette avec synopsis) */
.dvd-back {
  width: 100%;
  transform: rotateY(180deg) translateZ(11px);
  background-color: #1a1a1a;
  border-radius: 4px 0 0 4px;
}
.dvd-back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 4px 0 0 4px;
}

/* Côté du DVD : La Tranche (Spine) */
.dvd-spine-left {
  width: 22px; /* Largeur exacte de l'épaisseur */
  transform: rotateY(-90deg) translateZ(11px);
  background: #111;
  border-left: 1px solid rgba(255,255,255,0.05);
  border-right: 1px solid rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Texte imprimé sur le côté du DVD */
.dvd-spine-text {
  color: #e0e0e0;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  white-space: nowrap;
  transform: rotate(90deg);
  letter-spacing: 2px;
  width: 280px;
  text-align: center;
}

/* Côté droit (Ouverture du boîtier plastique noir ou transparent) */
.dvd-spine-right {
  width: 22px;
  background: linear-gradient(90deg, #151515 0%, #333 40%, #222 60%, #111 100%);
  transform: rotateY(90deg) translateZ(209px); /* Largeur totale - moitié épaisseur */
}

@keyframes spin3D {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

/* CONTROLS */
.overlay {
  position: fixed;
  bottom: 30px;
  width: 100%;
  text-align: center;
  z-index: 50;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.control-btn {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(5px);
  color: white;
  font-size: 18px;
  padding: 16px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  cursor: pointer;
}
.control-btn:hover { background: rgba(255, 255, 255, 0.2); }

.status {
  position: fixed;
  top: 75px;
  right: 15px;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  z-index: 50;
}
.watched { background: #1db954; }
.not-watched { background: #e50914; }
</style>
</head>
<body>

<div id="topbar">
  <input id="title" placeholder="Ajouter un film...">
  <button class="search-btn" onclick="searchMovie()">+</button>
  <div class="results" id="results"></div>
</div>

<div id="movie-title"></div>
<div id="viewer"></div>
<div id="status"></div>

<div class="overlay">
  <div class="controls">
    <button class="control-btn" onclick="prev()">◀</button>
    <button class="control-btn" onclick="toggleWatched()">✓</button>
    <button class="control-btn" onclick="removeMovie()">🗑</button>
    <button class="control-btn" onclick="next()">▶</button>
  </div>
</div>

<script>
const apiKey = "410d347b";
let movies = JSON.parse(localStorage.getItem("movies")) || [];
let currentIndex = 0;
let startX = 0;

/* LIENS DIRECTS DE RECHANGE VERS LES DOS DE JAQUETTES (Exemple) */
// Tu peux ajouter ici les images arrière trouvées sur dvdcover.com pour tes films favoris.
const backCoversDB = {
  "tt0088763": "https://images.squarespace-cdn.com/content/v1/5c5a08aa697a98c8af34eb3b/1554907954124-7C7I0A6Z5W3O0RQLF1D1/BTTF_Back.jpg"
};

function getHDPoster(url) {
  if (!url || url === "N/A") return url;
  return url.replace(/@@\._V1_SX\d+\.jpg$/, "@@._V1_.jpg").replace("SX300", "SX1000");
}

async function searchMovie() {
  const title = document.getElementById("title").value;
  const res = await fetch(`https://www.omdbapi.com/?s=${title}&apikey=${apiKey}`);
  const data = await res.json();
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  if(data.Search){
    data.Search.forEach(movie=>{
      if(movie.Poster !== "N/A"){
        const img = document.createElement("img");
        img.src = getHDPoster(movie.Poster);
        img.onclick = ()=>addMovie(movie);
        resultsDiv.appendChild(img);
      }
    });
  }
}

function addMovie(movie){
  movie.Poster = getHDPoster(movie.Poster);
  movie.watched = false;
  
  // Assigner l'arrière s'il existe dans notre base, sinon mettre un fond de boîte générique propre
  movie.Back = backCoversDB[movie.imdbID] || "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=500&q=80"; 
  
  movies.push(movie);
  save();
  render();
}

function render(){
  const viewer = document.getElementById("viewer");
  const titleDiv = document.getElementById("movie-title");
  const statusDiv = document.getElementById("status");
  
  viewer.innerHTML = "";
  titleDiv.innerText = "";
  statusDiv.innerHTML = "";

  if(!movies.length) return;

  titleDiv.innerText = movies[currentIndex].Title;
  statusDiv.innerHTML = `<div class="status ${movies[currentIndex].watched ? "watched" : "not-watched"}">${movies[currentIndex].watched ? "VU" : "À VOIR"}</div>`;

  const prevIndex = (currentIndex - 1 + movies.length) % movies.length;
  const nextIndex = (currentIndex + 1) % movies.length;

  movies.forEach((movie, index) => {
    if (index === currentIndex || index === prevIndex || index === nextIndex || movies.length <= 3) {
      
      const container = document.createElement("div");
      container.className = "dvd-container";
      
      if (index === currentIndex) container.classList.add("active");
      else if (index === prevIndex && movies.length > 1) { container.classList.add("prev-slide"); container.onclick = prev; }
      else if (index === nextIndex && movies.length > 1) { container.classList.add("next-slide"); container.onclick = next; }

      // Construction sans aucun flou (Images nettes + Texte propre sur le côté)
      container.innerHTML = `
        <div class="dvd-box">
          <div class="dvd-face dvd-front">
            <img src="${movie.Poster}" alt="Front">
          </div>
          <div class="dvd-face dvd-back">
            <img src="${movie.Back}" alt="Back">
          </div>
          <div class="dvd-face dvd-spine-left">
            <div class="dvd-spine-text">${movie.Title}</div>
          </div>
          <div class="dvd-face dvd-spine-right"></div>
        </div>
      `;
      
      viewer.appendChild(container);
    }
  });
}

function toggleWatched(){ if(!movies.length) return; movies[currentIndex].watched=!movies[currentIndex].watched; save(); render(); }
function next(){ if(!movies.length) return; currentIndex=(currentIndex+1)%movies.length; render(); }
function prev(){ if(!movies.length) return; currentIndex=(currentIndex-1+movies.length)%movies.length; render(); }
function removeMovie(){ if(!movies.length) return; movies.splice(currentIndex,1); currentIndex = 0; save(); render(); }
function save(){ localStorage.setItem("movies",JSON.stringify(movies)); }

document.addEventListener("touchstart",e=>{ startX=e.touches[0].clientX; });
document.addEventListener("touchend",e=>{ let endX=e.changedTouches[0].clientX; if(endX-startX>50) prev(); if(startX-endX>50) next(); });

render();
</script>
</body>
</html>
