<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Watchlist 3D 100% Automatique</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0a0a0a;
  color: white;
  overflow: hidden;
  perspective: 1500px;
}

/* TOP BAR */
#topbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.85);
  padding: 12px;
  backdrop-filter: blur(12px);
  z-index: 100;
}

input {
  width: 65%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  font-size: 16px;
  background: #222;
  color: white;
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 25px;
  font-size: 14px;
  cursor: pointer;
}

.search-btn { background: #1db954; color: white; }

.results {
  display: flex;
  overflow-x: auto;
  margin-top: 10px;
}

.results img {
  height: 130px;
  border-radius: 8px;
  margin-right: 10px;
  cursor: pointer;
}

/* TITRE */
#movie-title {
  position: fixed;
  top: 140px;
  width: 100%;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 2px;
  z-index: 10;
  text-shadow: 0 2px 10px rgba(0,0,0,0.9);
}

/* VIEWER */
#viewer {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  height: 100vh;
  position: relative;
}

.dvd-container {
  position: absolute;
  width: 220px;
  height: 310px;
  transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
  transform-style: preserve-3d;
  opacity: 0;
  visibility: hidden;
}

.dvd-container.active {
  opacity: 1;
  visibility: visible;
  transform: translate3d(0, 20px, 0);
  z-index: 5;
}

.dvd-container.active .dvd-box {
  animation: spin3D 15s linear infinite;
}

.dvd-container.active:hover .dvd-box {
  animation-play-state: paused;
}

.dvd-container.prev-slide {
  opacity: 0.3;
  visibility: visible;
  transform: translate3d(-340px, 40px, -250px) rotateY(40deg);
  z-index: 3;
  cursor: pointer;
}

.dvd-container.next-slide {
  opacity: 0.3;
  visibility: visible;
  transform: translate3d(340px, 40px, -250px) rotateY(-40deg);
  z-index: 3;
  cursor: pointer;
}

/* STRUCTURE CUBE 3D */
.dvd-box {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

.dvd-face {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
  background-size: cover;
  background-repeat: no-repeat;
}

/* Si la jaquette complète (Full Cover) est chargée */
.full-cover .dvd-front {
  width: 100%;
  transform: translateZ(10px);
  background-position: 99% center; /* Ajustement fin pour l'avant */
  border-radius: 0 4px 4px 0;
}

.full-cover .dvd-back {
  width: 100%;
  transform: rotateY(180deg) translateZ(10px);
  background-position: 1% center; /* Ajustement fin pour l'arrière */
  border-radius: 4px 0 0 4px;
}

.full-cover .dvd-spine-left {
  width: 20px;
  transform: rotateY(-90deg) translateZ(10px);
  background-position: 50% center; /* La tranche au milieu */
}

/* Si on utilise l'affiche simple d'OMDb (Fallback) */
.fallback-cover .dvd-front {
  width: 100%;
  transform: translateZ(10px);
}
.fallback-cover .dvd-front img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }

.fallback-cover .dvd-back {
  width: 100%;
  transform: rotateY(180deg) translateZ(10px);
  background: #151515;
}
.fallback-cover .dvd-back img { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); filter: blur(2px) brightness(0.3); }

.fallback-cover .dvd-spine-left {
  width: 20px;
  background: linear-gradient(90deg, #111, #333, #111);
  transform: rotateY(-90deg) translateZ(10px);
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.fallback-cover .dvd-spine-text { color: #aaa; font-size: 10px; font-weight: bold; text-transform: uppercase; transform: rotate(90deg); white-space: nowrap; width: 280px; text-align: center; }

.dvd-spine-right {
  width: 20px;
  background: linear-gradient(90deg, #222, #444 30%, #111 80%);
  transform: rotateY(90deg) translateZ(210px);
}

@keyframes spin3D {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

/* CONTROLS */
.overlay { position: fixed; bottom: 30px; width: 100%; text-align: center; z-index: 50; }
.controls { display: flex; justify-content: center; gap: 15px; }
.control-btn { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(5px); color: white; font-size: 18px; padding: 16px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; }
.status { position: fixed; top: 75px; right: 15px; padding: 8px 14px; border-radius: 20px; font-size: 14px; font-weight: bold; z-index: 50; }
.watched { background: #1db954; }
.not-watched { background: #e50914; }
</style>
</head>
<body>

<div id="topbar">
  <input id="title" placeholder="Ajouter un film...">
  <button class="search-btn" onclick="searchMovie()">+</button>
  <div class="results" id="results"></div>
</div>

<div id="movie-title"></div>
<div id="viewer"></div>
<div id="status"></div>

<div class="overlay">
  <div class="controls">
    <button class="control-btn" onclick="prev()">◀</button>
    <button class="control-btn" onclick="toggleWatched()">✓</button>
    <button class="control-btn" onclick="removeMovie()">🗑</button>
    <button class="control-btn" onclick="next()">▶</button>
  </div>
</div>

<script>
const apiKey = "410d347b";
let movies = JSON.parse(localStorage.getItem("movies")) || [];
let currentIndex = 0;
let startX = 0;

function getHDPoster(url) {
  if (!url || url === "N/A") return url;
  return url.replace(/@@\._V1_SX\d+\.jpg$/, "@@._V1_.jpg").replace("SX300", "SX1000");
}

/* RECHERCHE INITIALE OMDb */
async function searchMovie() {
  const title = document.getElementById("title").value;
  const res = await fetch(`https://www.omdbapi.com/?s=${title}&apikey=${apiKey}`);
  const data = await res.json();
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  if(data.Search){
    data.Search.forEach(movie=>{
      if(movie.Poster !== "N/A"){
        const img = document.createElement("img");
        img.src = getHDPoster(movie.Poster);
        img.onclick = ()=>addMovie(movie);
        resultsDiv.appendChild(img);
      }
    });
  }
}

/* AUTOMATISATION : Recherche de la jaquette complète à plat via l'ID IMDb */
async function fetchFullDvdCover(title, imdbID) {
  try {
    // Utilisation d'un moteur de recherche public via Proxy CORS pour trouver une jaquette sur dvd-covers ou similaire
    const query = encodeURIComponent(`${title} ${imdbID} dvd cover full`);
    const searchUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(`https://html.duckduckgo.com/html/?q=${query}`)}`;
    
    const response = await fetch(searchUrl);
    const data = await response.json();
    
    // Analyse basique du HTML retourné pour extraire une image pertinente de jaquette
    const parser = new DOMParser();
    const doc = parser.parseFromString(data.contents, 'text/html');
    const images = doc.querySelectorAll('.image_link, img');
    
    for (let img of images) {
      const src = img.src || img.getAttribute('href');
      // On cherche des images qui contiennent des indices de scans complets (souvent larges et au format JPG)
      if (src && (src.includes('cover') || src.includes('jaquette')) && !src.includes('amazon')) {
        // Nettoyage de l'URLDuckDuckGo si nécessaire
        if(src.startsWith('//')) return 'https:' + src;
        return src;
      }
    }
  } catch (e) {
    console.log("Impossible de récupérer automatiquement le scan complet, repli sur l'affiche.");
  }
  return null;
}

async function addMovie(movie){
  movie.Poster = getHDPoster(movie.Poster);
  movie.watched = false;
  
  // On tente de trouver la jaquette complète en arrière-plan avant d'ajouter
  movie.fullCover = await fetchFullDvdCover(movie.Title, movie.imdbID);
  
  movies.push(movie);
  save();
  render();
}

function render(){
  const viewer = document.getElementById("viewer");
  const titleDiv = document.getElementById("movie-title");
  const statusDiv = document.getElementById("status");
  
  viewer.innerHTML = "";
  titleDiv.innerText = "";
  statusDiv.innerHTML = "";

  if(!movies.length) return;

  titleDiv.innerText = movies[currentIndex].Title;
  statusDiv.innerHTML = `<div class="status ${movies[currentIndex].watched ? "watched" : "not-watched"}">${movies[currentIndex].watched ? "VU" : "À VOIR"}</div>`;

  const prevIndex = (currentIndex - 1 + movies.length) % movies.length;
  const nextIndex = (currentIndex + 1) % movies.length;

  movies.forEach((movie, index) => {
    if (index === currentIndex || index === prevIndex || index === nextIndex || movies.length <= 3) {
      
      const container = document.createElement("div");
      container.className = "dvd-container";
      
      if (index === currentIndex) container.classList.add("active");
      else if (index === prevIndex && movies.length > 1) { container.classList.add("prev-slide"); container.onclick = prev; }
      else if (index === nextIndex && movies.length > 1) { container.classList.add("next-slide"); container.onclick = next; }

      if (movie.fullCover) {
        // SI LE SCRIPT A TROUVÉ LA JAQUETTE AUTOMATIQUEMENT
        container.innerHTML = `
          <div class="dvd-box full-cover">
            <div class="dvd-face dvd-front" style="background-image: url('${movie.fullCover}');"></div>
            <div class="dvd-face dvd-back" style="background-image: url('${movie.fullCover}');"></div>
            <div class="dvd-face dvd-spine-left" style="background-image: url('${movie.fullCover}');"></div>
            <div class="dvd-face dvd-spine-right"></div>
          </div>`;
      } else {
        // AFFICHE D'ORIGINE AVEC LES EFFETS 3D APPLIQUÉS SI LE SCAN N'EXISTE PAS
        container.innerHTML = `
          <div class="dvd-box fallback-cover">
            <div class="dvd-face dvd-front"><img src="${movie.Poster}"></div>
            <div class="dvd-face dvd-back"><img src="${movie.Poster}"></div>
            <div class="dvd-face dvd-spine-left"><div class="fallback-cover dvd-spine-text">${movie.Title}</div></div>
            <div class="dvd-face dvd-spine-right"></div>
          </div>`;
      }
      
      viewer.appendChild(container);
    }
  });
}

function toggleWatched(){ if(!movies.length) return; movies[currentIndex].watched=!movies[currentIndex].watched; save(); render(); }
function next(){ if(!movies.length) return; currentIndex=(currentIndex+1)%movies.length; render(); }
function prev(){ if(!movies.length) return; currentIndex=(currentIndex-1+movies.length)%movies.length; render(); }
function removeMovie(){ if(!movies.length) return; movies.splice(currentIndex,1); currentIndex = 0; save(); render(); }
function save(){ localStorage.setItem("movies",JSON.stringify(movies)); }

document.addEventListener("touchstart",e=>{ startX=e.touches[0].clientX; });
document.addEventListener("touchend",e=>{ let endX=e.changedTouches[0].clientX; if(endX-startX>50) prev(); if(startX-endX>50) next(); });

render();
</script>
</body>
</html>
