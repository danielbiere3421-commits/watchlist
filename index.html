<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Watchlist 3D Réaliste</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #0d0d0d;
  color: white;
  overflow: hidden;
  perspective: 1200px; /* Accentue l'effet de perspective 3D */
}

/* TOP BAR */
#topbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.85);
  padding: 12px;
  backdrop-filter: blur(12px);
  z-index: 100;
}

input {
  width: 65%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  font-size: 16px;
  background: #222;
  color: white;
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 25px;
  font-size: 14px;
  cursor: pointer;
}

.search-btn { background: #1db954; color: white; }

.results {
  display: flex;
  overflow-x: auto;
  margin-top: 10px;
}

.results img {
  height: 130px;
  border-radius: 8px;
  margin-right: 10px;
  cursor: pointer;
  transition: transform 0.2s;
}
.results img:hover { transform: scale(1.05); }

/* TITRE DU FILM */
#movie-title {
  position: fixed;
  top: 140px;
  width: 100%;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 2px;
  z-index: 10;
  text-shadow: 0 2px 10px rgba(0,0,0,0.8);
}

/* CAROUSEL & VIEWER */
#viewer {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  height: 100vh;
  position: relative;
}

/* Positionnement des conteneurs */
.dvd-container {
  position: absolute;
  width: 220px;
  height: 310px;
  transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
  transform-style: preserve-3d;
  opacity: 0;
  visibility: hidden;
}

/* DVD Actif au centre avec animation 360° */
.dvd-container.active {
  opacity: 1;
  visibility: visible;
  transform: translate3d(0, 20px, 0);
  z-index: 5;
}

.dvd-container.active .dvd-box {
  animation: spin3D 12s linear infinite; /* Animation de rotation infinie à 360° */
}

/* Survol pour mettre l'animation en pause si on veut l'observer */
.dvd-container.active:hover .dvd-box {
  animation-play-state: paused;
}

/* DVD sur les côtés fixes (sans rotation automatique) */
.dvd-container.prev-slide {
  opacity: 0.35;
  visibility: visible;
  transform: translate3d(-320px, 40px, -200px) rotateY(35deg);
  z-index: 3;
  cursor: pointer;
}

.dvd-container.next-slide {
  opacity: 0.35;
  visibility: visible;
  transform: translate3d(320px, 40px, -200px) rotateY(-35deg);
  z-index: 3;
  cursor: pointer;
}

/* STRUCTURE DU BOÎTIER EN VRAIE 3D (Épaisseur de 16px) */
.dvd-box {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

/* Propriétés communes aux faces */
.dvd-face {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

/* Face Avant (Jaquette) */
.dvd-front {
  width: 100%;
  transform: translateZ(8px); /* Poussée vers l'avant de la moitié de l'épaisseur */
}
.dvd-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 4px;
}

/* Face Arrière (Dos du boîtier) */
.dvd-back {
  width: 100%;
  transform: rotateY(180deg) translateZ(8px);
}
.dvd-back img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.5) contrast(1.2); /* Simule l'arrière plus sombre / plastique transparent */
  border-radius: 4px;
}

/* Tranche Gauche */
.dvd-spine-left {
  width: 16px; /* Épaisseur exacte */
  background: #151515;
  transform: rotateY(-90deg) translateZ(8px);
  box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
}

/* Tranche Droite (Ouverture en plastique transparent) */
.dvd-spine-right {
  width: 16px;
  background: rgba(200, 200, 200, 0.2);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(2px);
  transform: rotateY(90deg) translateZ(212px); /* Largeur du boîtier (220) - moitié épaisseur (8) */
}

/* ANIMATION ROTATION 360 DEGRÉS */
@keyframes spin3D {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

/* CONTROLS & STATUS */
.overlay {
  position: fixed;
  bottom: 30px;
  width: 100%;
  text-align: center;
  z-index: 50;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.control-btn {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(5px);
  color: white;
  font-size: 18px;
  padding: 16px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.2);
  cursor: pointer;
}
.control-btn:hover { background: rgba(255, 255, 255, 0.25); }

.status {
  position: fixed;
  top: 75px;
  right: 15px;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  z-index: 50;
}
.watched { background: #1db954; }
.not-watched { background: #e50914; }
</style>
</head>

<body>

<div id="topbar">
  <input id="title" placeholder="Ajouter un film...">
  <button class="search-btn" onclick="searchMovie()">+</button>
  <div class="results" id="results"></div>
</div>

<div id="movie-title"></div>

<div id="viewer"></div>
<div id="status"></div>

<div class="overlay">
  <div class="controls">
    <button class="control-btn" onclick="prev()">◀</button>
    <button class="control-btn" onclick="toggleWatched()">✓</button>
    <button class="control-btn" onclick="removeMovie()">🗑</button>
    <button class="control-btn" onclick="next()">▶</button>
  </div>
</div>

<script>
const apiKey = "410d347b";
let movies = JSON.parse(localStorage.getItem("movies")) || [];
let currentIndex = 0;
let startX = 0;

function getHDPoster(url) {
  if (!url || url === "N/A") return url;
  return url.replace(/@@\._V1_SX\d+\.jpg$/, "@@._V1_.jpg").replace("SX300", "SX1000");
}

async function searchMovie() {
  const title = document.getElementById("title").value;
  const res = await fetch(`https://www.omdbapi.com/?s=${title}&apikey=${apiKey}`);
  const data = await res.json();
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  if(data.Search){
    data.Search.forEach(movie=>{
      if(movie.Poster !== "N/A"){
        const img = document.createElement("img");
        img.src = getHDPoster(movie.Poster);
        img.onclick = ()=>addMovie(movie);
        resultsDiv.appendChild(img);
      }
    });
  }
}

function addMovie(movie){
  movie.Poster = getHDPoster(movie.Poster);
  movie.watched = false;
  movies.push(movie);
  save();
  render();
}

function render(){
  const viewer = document.getElementById("viewer");
  const titleDiv = document.getElementById("movie-title");
  const statusDiv = document.getElementById("status");
  
  viewer.innerHTML = "";
  titleDiv.innerText = "";
  statusDiv.innerHTML = "";

  if(!movies.length) return;

  titleDiv.innerText = movies[currentIndex].Title;

  statusDiv.innerHTML = `
    <div class="status ${movies[currentIndex].watched ? "watched" : "not-watched"}">
      ${movies[currentIndex].watched ? "VU" : "À VOIR"}
    </div>`;

  const prevIndex = (currentIndex - 1 + movies.length) % movies.length;
  const nextIndex = (currentIndex + 1) % movies.length;

  movies.forEach((movie, index) => {
    if (index === currentIndex || index === prevIndex || index === nextIndex || movies.length <= 3) {
      
      const container = document.createElement("div");
      container.className = "dvd-container";
      
      if (index === currentIndex) {
        container.classList.add("active");
      } else if (index === prevIndex && movies.length > 1) {
        container.classList.add("prev-slide");
        container.onclick = prev;
      } else if (index === nextIndex && movies.length > 1) {
        container.classList.add("next-slide");
        container.onclick = next;
      }

      // Construction de la boîte en vraie 3D géométrique multi-face
      container.innerHTML = `
        <div class="dvd-box">
          <div class="dvd-face dvd-front">
            <img src="${movie.Poster}" alt="Front">
          </div>
          <div class="dvd-face dvd-back">
            <img src="${movie.Poster}" alt="Back">
          </div>
          <div class="dvd-face dvd-spine-left"></div>
          <div class="dvd-face dvd-spine-right"></div>
        </div>
      `;
      
      viewer.appendChild(container);
    }
  });
}

function toggleWatched(){
  if(!movies.length) return;
  movies[currentIndex].watched=!movies[currentIndex].watched;
  save();
  render();
}

function next(){
  if(!movies.length) return;
  currentIndex=(currentIndex+1)%movies.length;
  render();
}

function prev(){
  if(!movies.length) return;
  currentIndex=(currentIndex-1+movies.length)%movies.length;
  render();
}

function removeMovie(){
  if(!movies.length) return;
  movies.splice(currentIndex,1);
  currentIndex = 0;
  save();
  render();
}

function save(){
  localStorage.setItem("movies",JSON.stringify(movies));
}

document.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
  let endX=e.changedTouches[0].clientX;
  if(endX-startX>50) prev();
  if(startX-endX>50) next();
});

render();
</script>

</body>
</html>
