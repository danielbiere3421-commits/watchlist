<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Watchlist DVD 3D Parfaite</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: #080808;
  color: white;
  overflow: hidden;
  perspective: 1500px;
}

/* TOP BAR */
#topbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.9);
  padding: 12px;
  backdrop-filter: blur(12px);
  z-index: 100;
  border-bottom: 1px solid #111;
}

input {
  width: 65%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  font-size: 16px;
  background: #1c1c1c;
  color: white;
}

button {
  padding: 12px 16px;
  border: none;
  border-radius: 25px;
  font-size: 14px;
  cursor: pointer;
}

.search-btn { background: #1db954; color: white; }

.results {
  display: flex;
  overflow-x: auto;
  margin-top: 10px;
}

.results img {
  height: 130px;
  border-radius: 6px;
  margin-right: 10px;
  cursor: pointer;
}

/* TITRE DU FILM */
#movie-title {
  position: fixed;
  top: 140px;
  width: 100%;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
  text-transform: uppercase;
  letter-spacing: 2px;
  z-index: 10;
}

/* CAROUSEL CONTENEUR */
#viewer {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100vw;
  height: 100vh;
  position: relative;
}

.dvd-container {
  position: absolute;
  width: 220px;
  height: 310px;
  transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
  transform-style: preserve-3d;
  opacity: 0;
  visibility: hidden;
}

.dvd-container.active {
  opacity: 1;
  visibility: visible;
  transform: translate3d(0, 20px, 0);
  z-index: 5;
}

/* Animation de rotation à 360° forcée */
.dvd-container.active .dvd-box {
  animation: spin3D 12s linear infinite;
}

.dvd-container.active:hover .dvd-box {
  animation-play-state: paused;
}

/* DVD sur les côtés */
.dvd-container.prev-slide {
  opacity: 0.25;
  visibility: visible;
  transform: translate3d(-350px, 40px, -200px) rotateY(45deg);
  z-index: 3;
  cursor: pointer;
}

.dvd-container.next-slide {
  opacity: 0.25;
  visibility: visible;
  transform: translate3d(350px, 40px, -200px) rotateY(-45deg);
  z-index: 3;
  cursor: pointer;
}

/* STRUCTURE DU BOÎTIER DVD REEL */
.dvd-box {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

.dvd-face {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.9);
  box-sizing: border-box;
}

/* FACE AVANT (Jaquette HD principale) */
.dvd-front {
  width: 100%;
  transform: translateZ(10px); /* Moitié de l'épaisseur totale (20px) */
  backface-visibility: hidden;
}
.dvd-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 0 4px 4px 0;
}

/* VRAIE FACE ARRIÈRE GÉNÉRÉE (Fini le flou, design propre style dos de DVD) */
.dvd-back {
  width: 100%;
  transform: rotateY(180deg) translateZ(10px);
  background: #141414;
  border: 4px solid #1a1a1a;
  border-radius: 4px 0 0 4px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.dvd-back-header {
  font-size: 14px;
  font-weight: bold;
  text-transform: uppercase;
  border-bottom: 1px solid #333;
  padding-bottom: 5px;
  color: #1db954;
}
.dvd-back-body {
  font-size: 10px;
  color: #aaa;
  line-height: 1.4;
  text-align: justify;
}
.dvd-back-footer {
  font-size: 8px;
  color: #555;
  text-align: center;
  border-top: 1px solid #222;
  padding-top: 5px;
  letter-spacing: 1px;
}

/* TRANCHE DU DVD (Le Côté) */
.dvd-spine-left {
  width: 20px; /* Épaisseur du boîtier */
  height: 100%;
  transform: rotateY(-90deg) translateZ(10px);
  background: #111;
  border-left: 1px solid rgba(255,255,255,0.1);
  border-right: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.dvd-spine-text {
  color: #fff;
  font-size: 10px;
  font-weight: bold;
  text-transform: uppercase;
  white-space: nowrap;
  transform: rotate(90deg);
  letter-spacing: 3px;
  width: 280px;
  text-align: center;
}

/* CÔTÉ DROIT (Plastique noir d'ouverture) */
.dvd-spine-right {
  width: 20px;
  background: linear-gradient(90deg, #151515 0%, #2a2a2a 40%, #1a1a1a 60%, #0d0d0d 100%);
  transform: rotateY(90deg) translateZ(210px);
}

@keyframes spin3D {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

/* CONTROLS & UTILS */
.overlay {
  position: fixed;
  bottom: 30px;
  width: 100%;
  text-align: center;
  z-index: 50;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.control-btn {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(5px);
  color: white;
  font-size: 18px;
  padding: 16px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  cursor: pointer;
}
.control-btn:hover { background: rgba(255, 255, 255, 0.2); }

.status {
  position: fixed;
  top: 75px;
  right: 15px;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  z-index: 50;
}
.watched { background: #1db954; }
.not-watched { background: #e50914; }
</style>
</head>
<body>

<div id="topbar">
  <input id="title" placeholder="Ajouter un film...">
  <button class="search-btn" onclick="searchMovie()">+</button>
  <div class="results" id="results"></div>
</div>

<div id="movie-title"></div>
<div id="viewer"></div>
<div id="status"></div>

<div class="overlay">
  <div class="controls">
    <button class="control-btn" onclick="prev()">◀</button>
    <button class="control-btn" onclick="toggleWatched()">✓</button>
    <button class="control-btn" onclick="removeMovie()">🗑</button>
    <button class="control-btn" onclick="next()">▶</button>
  </div>
</div>

<script>
const apiKey = "410d347b";
let movies = JSON.parse(localStorage.getItem("movies")) || [];
let currentIndex = 0;
let startX = 0;

function getHDPoster(url) {
  if (!url || url === "N/A") return url;
  return url.replace(/@@\._V1_SX\d+\.jpg$/, "@@._V1_.jpg").replace("SX300", "SX1000");
}

async function searchMovie() {
  const title = document.getElementById("title").value;
  const res = await fetch(`https://www.omdbapi.com/?s=${title}&apikey=${apiKey}`);
  const data = await res.json();
  const resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  if(data.Search){
    data.Search.forEach(movie=>{
      if(movie.Poster !== "N/A"){
        const img = document.createElement("img");
        img.src = getHDPoster(movie.Poster);
        img.onclick = ()=>addMovie(movie);
        resultsDiv.appendChild(img);
      }
    });
  }
}

function addMovie(movie){
  movie.Poster = getHDPoster(movie.Poster);
  movie.watched = false;
  movies.push(movie);
  save();
  render();
}

function render(){
  const viewer = document.getElementById("viewer");
  const titleDiv = document.getElementById("movie-title");
  const statusDiv = document.getElementById("status");
  
  viewer.innerHTML = "";
  titleDiv.innerText = "";
  statusDiv.innerHTML = "";

  if(!movies.length) return;

  titleDiv.innerText = movies[currentIndex].Title;
  statusDiv.innerHTML = `<div class="status ${movies[currentIndex].watched ? "watched" : "not-watched"}">${movies[currentIndex].watched ? "VU" : "À VOIR"}</div>`;

  const prevIndex = (currentIndex - 1 + movies.length) % movies.length;
  const nextIndex = (currentIndex + 1) % movies.length;

  movies.forEach((movie, index) => {
    if (index === currentIndex || index === prevIndex || index === nextIndex || movies.length <= 3) {
      
      const container = document.createElement("div");
      container.className = "dvd-container";
      
      if (index === currentIndex) container.classList.add("active");
      else if (index === prevIndex && movies.length > 1) { container.classList.add("prev-slide"); container.onclick = prev; }
      else if (index === nextIndex && movies.length > 1) { container.classList.add("next-slide"); container.onclick = next; }

      // HTML structure forcée : Face avant nette, Vrai dos généré propre, Vrai côté texturé
      container.innerHTML = `
        <div class="dvd-box">
          <div class="dvd-face dvd-front">
            <img src="${movie.Poster}" alt="Front">
          </div>
          <div class="dvd-face dvd-back">
            <div class="dvd-back-header">Synopsis & Spécifications</div>
            <div class="dvd-back-body">
              Découvrez l'aventure extraordinaire de ce chef-d'œuvre cinématographique mondialement acclamé : "${movie.Title}". Retrouvez les acteurs phares et des scènes d'anthologie dans cette édition collector exclusive en haute définition.
            </div>
            <div class="dvd-back-footer">
              DOLBY DIGITAL - DVD VIDEO - PAL - REGION 2 - COMPATIBLE 16:9
            </div>
          </div>
          <div class="dvd-face dvd-spine-left">
            <div class="dvd-spine-text">${movie.Title}</div>
          </div>
          <div class="dvd-face dvd-spine-right"></div>
        </div>
      `;
      
      viewer.appendChild(container);
    }
  });
}

function toggleWatched(){ if(!movies.length) return; movies[currentIndex].watched=!movies[currentIndex].watched; save(); render(); }
function next(){ if(!movies.length) return; currentIndex=(currentIndex+1)%movies.length; render(); }
function prev(){ if(!movies.length) return; currentIndex=(currentIndex-1+movies.length)%movies.length; render(); }
function removeMovie(){ if(!movies.length) return; movies.splice(currentIndex,1); currentIndex = 0; save(); render(); }
function save(){ localStorage.setItem("movies",JSON.stringify(movies)); }

document.addEventListener("touchstart",e=>{ startX=e.touches[0].clientX; });
document.addEventListener("touchend",e=>{ let endX=e.changedTouches[0].clientX; if(endX-startX>50) prev(); if(startX-endX>50) next(); });

render();
</script>
</body>
</html>
