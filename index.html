<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ma Watchlist DVD 3D</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: radial-gradient(circle at center, #1e2640 0%, #0a0c14 100%);
  color: white;
  overflow: hidden;
  perspective: 2000px;
  user-select: none;
  -webkit-user-select: none;
  width: 100vw;
  height: 100vh;
}

/* RECHERCHE & TOPBAR */
#topbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(10, 12, 20, 0.8);
  padding: 15px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 100;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  box-sizing: border-box;
}

.search-box {
  display: flex;
  width: 100%;
  max-width: 500px;
  margin: 0 auto;
}

input {
  flex-grow: 1;
  padding: 12px 20px;
  border-radius: 25px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  font-size: 14px;
  background: #141929;
  color: white;
  outline: none;
}

button {
  padding: 12px 22px;
  border: none;
  border-radius: 25px;
  font-size: 14px;
  cursor: pointer;
  font-weight: bold;
  background: #6366f1;
  color: white;
  margin-left: 8px;
  transition: background 0.2s;
}
button:hover { background: #4f46e5; }

.results {
  display: flex;
  overflow-x: auto;
  margin-top: 10px;
  gap: 10px;
  width: 100%;
}
.results img {
  height: 100px;
  border-radius: 6px;
  cursor: pointer;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  transition: transform 0.2s;
}
.results img:hover { transform: scale(1.05); }

/* EN-TÊTE APPLI */
#app-header {
  position: fixed;
  top: 90px;
  width: 100%;
  text-align: center;
  z-index: 10;
}
.subtitle {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #818cf8;
  margin-bottom: 5px;
}
#movie-title {
  font-size: 26px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  text-shadow: 0 4px 12px rgba(0,0,0,0.5);
}

/* ZONE CAROUSEL */
#viewer {
  width: 100vw;
  height: 100vh;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  touch-action: none;
}

/* BOÎTIER DVD 3D */
.dvd-container {
  position: absolute;
  width: 220px;
  height: 310px;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s, visibility 0.6s;
  opacity: 0;
  visibility: hidden;
  z-index: 1;
}

/* ÉTATS DU CAROUSEL (Identique à ta vidéo modèle) */
.dvd-container.active {
  opacity: 1;
  visibility: visible;
  transform: translate3d(0, 40px, 0) rotateY(-15deg); /* Légère inclinaison de présentation */
  z-index: 10;
}

.dvd-container.prev-slide {
  opacity: 0.2;
  visibility: visible;
  transform: translate3d(-280px, 40px, -300px) rotateY(45deg);
  z-index: 5;
}

.dvd-container.next-slide {
  opacity: 0.2;
  visibility: visible;
  transform: translate3d(280px, 40px, -300px) rotateY(-45deg);
  z-index: 5;
}

.dvd-box {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s ease;
}

/* Animation au survol / appui pour voir l'arrière */
.dvd-container.active:hover .dvd-box {
  transform: rotateY(180deg);
}

.dvd-face {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  box-shadow: 0 20px 40px rgba(0,0,0,0.6);
  backface-visibility: hidden;
  border-radius: 4px;
  overflow: hidden;
  background: #111;
}

/* FACE AVANT */
.dvd-front {
  transform: translateZ(10px);
}
.dvd-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* FACE ARRIÈRE */
.dvd-back {
  transform: rotateY(180deg) translateZ(10px);
  padding: 15px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #0b0f19;
  border: 1px solid rgba(255,255,255,0.05);
}

.dvd-back-header {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  font-weight: bold;
  color: #6366f1;
}
.dvd-rating { color: #f5c518; }
.dvd-back-body {
  font-size: 10px;
  color: #94a3b8;
  line-height: 1.4;
  text-align: justify;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 7;
  -webkit-box-orient: vertical;
}
.dvd-back-meta {
  font-size: 9px;
  color: #64748b;
  border-top: 1px dashed rgba(255,255,255,0.1);
  padding-top: 8px;
}
.dvd-back-meta strong { color: #cbd5e1; }

/* TRANCHE DU BOÎTIER */
.dvd-spine {
  position: absolute;
  top: 0;
  left: -10px;
  width: 20px;
  height: 100%;
  background: #070a12;
  transform: rotateY(-90deg);
  transform-origin: right center;
  display: flex;
  align-items: center;
  justify-content: center;
}
.dvd-spine-text {
  color: rgba(255,255,255,0.7);
  font-size: 9px;
  font-weight: bold;
  text-transform: uppercase;
  white-space: nowrap;
  transform: rotate(90deg);
  letter-spacing: 1px;
}

/* CONTRÔLES INFÉRIEURS */
.action-zone {
  position: fixed;
  bottom: 40px;
  width: 100%;
  text-align: center;
  z-index: 50;
}
.delete-btn {
  background: rgba(239, 68, 68, 0.1);
  border: 1px solid rgba(239, 68, 68, 0.2);
  color: #ef4444;
  padding: 10px 24px;
  border-radius: 25px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: all 0.2s;
}
.delete-btn:hover { background: rgba(239, 68, 68, 0.25); }

#status {
  position: fixed;
  top: 100px;
  right: 20px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: bold;
  z-index: 50;
  cursor: pointer;
}
.watched { background: #10b981; color: white; }
.not-watched { background: #f59e0b; color: white; }
</style>
</head>
<body>

<div id="topbar">
  <div class="search-box">
    <input id="title" placeholder="Rechercher et ajouter un film (ex: Dune, Inception)...">
    <button onclick="searchMovie()">+</button>
  </div>
  <div class="results" id="results"></div>
</div>

<div id="app-header">
  <div class="subtitle">Watchlist</div>
  <div id="movie-title">Aucun film</div>
</div>

<div id="viewer"></div>
<div id="status" onclick="toggleWatched()"></div>

<div class="action-zone">
  <button class="delete-btn" onclick="removeMovie()">Supprimer de la liste</button>
</div>

<script>
const apiKey = "410d347b";
let movies = JSON.parse(localStorage.getItem("movies")) || [];
let currentIndex = 0;
let touchStartX = 0;

function cleanPosterURL(url) {
  if (!url || url === "N/A") return "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=500&q=80";
  return url.replace("SX300", "SX1000").startsWith("http://") ? url.replace("http://", "https://") : url;
}

async function searchMovie() {
  const title = document.getElementById("title").value.trim();
  if(!title) return;
  
  try {
    const res = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(title)}&apikey=${apiKey}`);
    const data = await res.json();
    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if(data.Search){
      data.Search.forEach(movie => {
        if(movie.Poster !== "N/A"){
          const img = document.createElement("img");
          img.src = cleanPosterURL(movie.Poster);
          img.onclick = () => fetchFullDetails(movie.imdbID);
          resultsDiv.appendChild(img);
        }
      });
    }
  } catch(e) { console.error("Erreur API", e); }
}

async function fetchFullDetails(imdbID) {
  const res = await fetch(`https://www.omdbapi.com/?i=${imdbID}&plot=full&apikey=${apiKey}`);
  const detail = await res.json();
  
  const cleanMovie = {
    Title: detail.Title || "Titre Inconnu",
    Poster: cleanPosterURL(detail.Poster),
    Plot: detail.Plot && detail.Plot !== "N/A" ? detail.Plot : "Aucun synopsis disponible.",
    Year: detail.Year || "N/A",
    Genre: detail.Genre || "Général",
    Director: detail.Director || "Inconnu",
    Actors: detail.Actors || "Inconnu",
    Rating: detail.imdbRating || "N/A",
    watched: false
  };

  movies.push(cleanMovie);
  currentIndex = movies.length - 1;
  save();
  
  document.getElementById("results").innerHTML = "";
  document.getElementById("title").value = "";
  buildCarousel();
  updateCarouselState();
}

// On construit l'arborescence DOM une seule fois ou quand la liste change de taille
function buildCarousel() {
  const viewer = document.getElementById("viewer");
  viewer.innerHTML = "";
  
  if(!movies.length) {
    document.getElementById("movie-title").innerText = "Aucun film";
    document.getElementById("status").style.display = "none";
    return;
  }
  document.getElementById("status").style.display = "block";

  movies.forEach((movie, index) => {
    const container = document.createElement("div");
    container.className = "dvd-container";
    container.id = `dvd-${index}`;
    
    container.innerHTML = `
      <div class="dvd-box">
        <div class="dvd-face dvd-front">
          <img src="${movie.Poster}" alt="Front">
        </div>
        <div class="dvd-face dvd-back">
          <div class="dvd-back-header">
            <span>${movie.Year} • ${movie.Genre.split(',')[0]}</span>
            <span class="dvd-rating">★ ${movie.Rating}</span>
          </div>
          <div class="dvd-back-body">${movie.Plot}</div>
          <div class="dvd-back-meta">
            <strong>Réal :</strong> ${movie.Director}<br>
            <strong>Avec :</strong> ${movie.Actors}
          </div>
        </div>
        <div class="dvd-spine">
          <div class="dvd-spine-text">${movie.Title}</div>
        </div>
      </div>
    `;
    viewer.appendChild(container);
  });
}

// On change simplement les classes CSS pour animer de façon fluide comme sur l'application native
function updateCarouselState() {
  if(!movies.length) return;

  const titleDiv = document.getElementById("movie-title");
  const statusDiv = document.getElementById("status");
  const currentMovie = movies[currentIndex];
  
  titleDiv.innerText = currentMovie.Title;
  statusDiv.innerHTML = `<div class="${currentMovie.watched ? 'watched' : 'not-watched'}">${currentMovie.watched ? 'VU' : 'À VOIR'}</div>`;

  const prevIndex = (currentIndex - 1 + movies.length) % movies.length;
  const nextIndex = (currentIndex + 1) % movies.length;

  movies.forEach((_, index) => {
    const el = document.getElementById(`dvd-${index}`);
    if(!el) return;
    
    el.className = "dvd-container"; // Reset
    
    if (index === currentIndex) {
      el.classList.add("active");
    } else if (index === prevIndex && movies.length > 1) {
      el.classList.add("prev-slide");
    } else if (index === nextIndex && movies.length > 1) {
      el.classList.add("next-slide");
    }
  });
}

/* DÉTECTION DU SWIPE FLUIDE */
const viewerZone = document.getElementById("viewer");
viewerZone.addEventListener("touchstart", e => touchStartX = e.touches[0].clientX, {passive: true});
viewerZone.addEventListener("touchend", e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) next(); else prev();
  }
}, {passive: true});

viewerZone.addEventListener("mousedown", e => touchStartX = e.clientX);
viewerZone.addEventListener("mouseup", e => {
  const diff = touchStartX - e.clientX;
  if (Math.abs(diff) > 50) {
    if (diff > 0) next(); else prev();
  }
});

function toggleWatched(){ if(!movies.length) return; movies[currentIndex].watched=!movies[currentIndex].watched; save(); updateCarouselState(); }
function next(){ if(!movies.length) return; currentIndex=(currentIndex+1)%movies.length; updateCarouselState(); }
function prev(){ if(!movies.length) return; currentIndex=(currentIndex-1+movies.length)%movies.length; updateCarouselState(); }
function removeMovie(){ if(!movies.length) return; movies.splice(currentIndex,1); currentIndex = 0; save(); buildCarousel(); updateCarouselState(); }
function save(){ localStorage.setItem("movies",JSON.stringify(movies)); }

// Initialisation
buildCarousel();
updateCarouselState();
</script>
</body>
</html>
