<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Watchlist DVD 3D Cinématique</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #080808;
  color: white;
  overflow: hidden;
  perspective: 2000px;
  user-select: none;
  transition: background 1s ease; /* Transition fluide du fond coloré */
}

/* FOND DYNAMIQUE DE COULEUR */
#bg-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(8,8,8,1) 80%);
  z-index: -1;
  pointer-events: none;
}

/* TOP BAR */
#topbar {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0, 0, 0, 0.85);
  padding: 15px;
  backdrop-filter: blur(20px);
  z-index: 100;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  box-sizing: border-box;
}

.search-box {
  display: flex;
  max-width: 600px;
  margin: 0 auto;
}

input {
  flex-grow: 1;
  padding: 12px 20px;
  border-radius: 25px;
  border: none;
  font-size: 16px;
  background: #1c1c1c;
  color: white;
  outline: none;
}

button {
  padding: 12px 24px;
  border: none;
  border-radius: 25px;
  font-size: 14px;
  cursor: pointer;
  font-weight: bold;
  background: #1db954;
  color: white;
  margin-left: 10px;
  transition: background 0.2s;
}
button:hover { background: #1ed760; }

.results {
  display: flex;
  overflow-x: auto;
  margin-top: 12px;
  gap: 12px;
  justify-content: center;
}

.results img {
  height: 120px;
  border-radius: 6px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}
.results img:hover { 
  transform: scale(1.05);
  box-shadow: 0 6px 15px rgba(29, 185, 84, 0.3);
}

/* TITRE DU FILM */
#movie-title {
  position: fixed;
  top: 160px;
  width: 100%;
  text-align: center;
  font-size: 32px;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 3px;
  z-index: 10;
  text-shadow: 0 4px 15px rgba(0,0,0,0.8);
}

/* ZONE DU CAROUSEL TOUCH / DRAG */
#viewer {
  width: 100vw;
  height: 100vh;
  position: relative;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: grab;
}
#viewer:active { cursor: grabbing; }

.dvd-container {
  position: absolute;
  width: 220px;
  height: 310px;
  transform-style: preserve-3d;
  opacity: 0;
  visibility: hidden;
  transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease;
}

/* ÉTAT ACTIF CENTRAL */
.dvd-container.active {
  opacity: 1;
  visibility: visible;
  transform: translate3d(0, 40px, 0);
  z-index: 5;
}

.dvd-container.active .dvd-box {
  animation: spin3D 15s linear infinite;
}

.dvd-container.active:hover .dvd-box {
  animation-play-state: paused;
}

/* EFFET DE PROFONDEUR DES CÔTÉS */
.dvd-container.prev-slide {
  opacity: 0.2;
  visibility: visible;
  transform: translate3d(-340px, 60px, -350px) rotateY(60deg);
  z-index: 3;
}

.dvd-container.next-slide {
  opacity: 0.2;
  visibility: visible;
  transform: translate3d(340px, 60px, -350px) rotateY(-60deg);
  z-index: 3;
}

/* BOÎTIER 3D STRUCTURE REELLE */
.dvd-box {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
}

.dvd-face {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  box-shadow: 0 20px 40px rgba(0,0,0,0.9);
  box-sizing: border-box;
  background: #141414;
}

/* RECTO */
.dvd-front {
  width: 100%;
  transform: translateZ(10px);
  backface-visibility: hidden;
}
.dvd-front img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 0 4px 4px 0;
}

/* VERSO (Vrai dos complet et sans aucun flou) */
.dvd-back {
  width: 100%;
  transform: rotateY(180deg) translateZ(10px);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 4px 0 0 4px;
  padding: 15px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #111111;
}

.dvd-back-header {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  font-weight: bold;
  color: #888;
  border-bottom: 1px solid #252525;
  padding-bottom: 5px;
}
.dvd-rating {
  color: #f5c518; /* Couleur Or IMDb */
  font-weight: bold;
}

.dvd-back-body {
  font-size: 10px;
  color: #ddd;
  line-height: 1.4;
  text-align: justify;
  margin: 10px 0;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 7; /* Limite propre pour éviter les débordements textuels */
  -webkit-box-orient: vertical;
}

.dvd-back-meta {
  font-size: 9px;
  color: #aaa;
  border-top: 1px dashed #252525;
  padding-top: 6px;
  line-height: 1.3;
}
.dvd-back-meta strong { color: #fff; }

.dvd-back-footer {
  font-size: 7px;
  color: #444;
  text-align: center;
  border-top: 1px solid #222;
  padding-top: 5px;
  letter-spacing: 0.5px;
}

/* CÔTÉ (Tranche) */
.dvd-spine-left {
  width: 20px;
  transform: rotateY(-90deg) translateZ(10px);
  background: #0d0d0d;
  border-left: 1px solid rgba(255,255,255,0.03);
  border-right: 1px solid rgba(255,255,255,0.03);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.dvd-spine-text {
  color: #fff;
  font-size: 10px;
  font-weight: bold;
  text-transform: uppercase;
  white-space: nowrap;
  transform: rotate(90deg);
  letter-spacing: 2.5px;
  width: 280px;
  text-align: center;
  opacity: 0.85;
}

/* PLASTIQUE TRUNCHE DROITE */
.dvd-spine-right {
  width: 20px;
  background: linear-gradient(90deg, #141414 0%, #2b2b2b 40%, #1a1a1a 60%, #0a0a0a 100%);
  transform: rotateY(90deg) translateZ(210px);
}

@keyframes spin3D {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

/* ZONE ACTIONS */
.action-zone {
  position: fixed;
  bottom: 40px;
  width: 100%;
  text-align: center;
  z-index: 50;
}
.delete-btn {
  background: rgba(229, 9, 20, 0.15);
  border: 1px solid rgba(229, 9, 20, 0.3);
  color: #ff4d4d;
  padding: 10px 24px;
  border-radius: 20px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.2s;
}
.delete-btn:hover { background: rgba(229, 9, 20, 0.35); }

.status {
  position: fixed;
  top: 85px;
  right: 20px;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: bold;
  z-index: 50;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.watched { background: #1db954; color: white; }
.not-watched { background: #e50914; color: white; }
</style>
</head>
<body>

<div id="bg-overlay"></div>

<div id="topbar">
  <div class="search-box">
    <input id="title" placeholder="Rechercher un film à ajouter...">
    <button onclick="searchMovie()">Ajouter</button>
  </div>
  <div class="results" id="results"></div>
</div>

<div id="movie-title"></div>
<div id="viewer"></div>
<div id="status" onclick="toggleWatched()"></div>

<div class="action-zone">
  <button class="delete-btn" onclick="removeMovie()">Supprimer de ma liste</button>
</div>

<script>
const apiKey = "410d347b";
let movies = JSON.parse(localStorage.getItem("movies")) || [];
let currentIndex = 0;

let touchStartX = 0;
let touchEndX = 0;

// Force l'affichage en HTTPS et demande les images grand format sans restrictions
function cleanPosterURL(url) {
  if (!url || url === "N/A") return "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=500&q=80";
  let hdUrl = url.replace(/@@\._V1_SX\d+\.jpg$/, "@@._V1_.jpg").replace("SX300", "SX1000");
  if (hdUrl.startsWith("http://")) {
    hdUrl = hdUrl.replace("http://", "https://");
  }
  return hdUrl;
}

async function searchMovie() {
  const title = document.getElementById("title").value.trim();
  if(!title) return;
  
  try {
    const res = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(title)}&apikey=${apiKey}`);
    const data = await res.json();
    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    if(data.Search){
      data.Search.forEach(movie => {
        if(movie.Poster !== "N/A"){
          const img = document.createElement("img");
          img.src = cleanPosterURL(movie.Poster);
          // Évite les blocages d'analyse de couleur inter-origines
          img.crossOrigin = "Anonymous"; 
          img.onclick = () => fetchFullDetails(movie.imdbID);
          resultsDiv.appendChild(img);
        }
      });
    }
  } catch (e) {
    console.error("Erreur de recherche", e);
  }
}

async function fetchFullDetails(imdbID) {
  try {
    const res = await fetch(`https://www.omdbapi.com/?i=${imdbID}&plot=full&apikey=${apiKey}`);
    const detail = await res.json();
    
    const cleanMovie = {
      Title: detail.Title,
      Poster: cleanPosterURL(detail.Poster),
      Plot: detail.Plot !== "N/A" ? detail.Plot : "Aucun synopsis officiel disponible pour cette édition.",
      Year: detail.Released !== "N/A" ? detail.Released : detail.Year,
      Genre: detail.Genre,
      Director: detail.Director,
      Actors: detail.Actors,
      Rating: detail.imdbRating !== "N/A" ? detail.imdbRating : "N/A",
      watched: false
    };

    movies.push(cleanMovie);
    currentIndex = movies.length - 1;
    save();
    
    document.getElementById("results").innerHTML = "";
    document.getElementById("title").value = "";
    render();
  } catch (e) {
    console.error("Erreur lors de la récupération des détails", e);
  }
}

// EXTRACTION MAGIQUE DE LA COULEUR MAJEURE (Via Canvas)
function applyDominantColor(imageUrl) {
  if (!imageUrl) return;
  
  const img = new Image();
  img.crossOrigin = "Anonymous";
  img.src = imageUrl;
  
  img.onload = function() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 10;
    canvas.height = 10;
    
    ctx.drawImage(img, 0, 0, 10, 10);
    const data = ctx.getImageData(0, 0, 10, 10).data;
    
    let r = 0, g = 0, b = 0, count = 0;
    // On fait la moyenne des pixels non-noirs pour choper la teinte vive
    for (let i = 0; i < data.length; i += 4) {
      if(data[i] > 30 || data[i+1] > 30 || data[i+2] > 30) {
        r += data[i];
        g += data[i+1];
        b += data[i+2];
        count++;
      }
    }
    
    if (count > 0) {
      r = Math.floor(r / count);
      g = Math.floor(g / count);
      b = Math.floor(b / count);
      // Applique un dégradé radial élégant centré derrière le boîtier
      document.body.style.background = `radial-gradient(circle, rgba(${r},${g},${b},0.35) 0%, rgba(8,8,8,1) 85%)`;
    } else {
      document.body.style.background = "#080808";
    }
  };
  
  img.onerror = function() {
    document.body.style.background = "#080808";
  };
}

function render(){
  const viewer = document.getElementById("viewer");
  const titleDiv = document.getElementById("movie-title");
  const statusDiv = document.getElementById("status");
  
  viewer.innerHTML = "";
  titleDiv.innerText = "";
  statusDiv.innerHTML = "";

  if(!movies.length) {
    document.body.style.background = "#080808";
    return;
  }

  const currentMovie = movies[currentIndex];
  titleDiv.innerText = currentMovie.Title;
  statusDiv.innerHTML = `<div class="${currentMovie.watched ? 'watched' : 'not-watched'}">${currentMovie.watched ? 'VU' : 'À VOIR'}</div>`;

  // Change l'ambiance lumineuse du fond en fonction du film en cours
  applyDominantColor(currentMovie.Poster);

  const prevIndex = (currentIndex - 1 + movies.length) % movies.length;
  const nextIndex = (currentIndex + 1) % movies.length;

  movies.forEach((movie, index) => {
    if (index === currentIndex || index === prevIndex || index === nextIndex || movies.length <= 3) {
      
      const container = document.createElement("div");
      container.className = "dvd-container";
      
      if (index === currentIndex) container.classList.add("active");
      else if (index === prevIndex && movies.length > 1) container.classList.add("prev-slide");
      else if (index === nextIndex && movies.length > 1) container.classList.add("next-slide");

      container.innerHTML = `
        <div class="dvd-box">
          <div class="dvd-face dvd-front">
            <img src="${movie.Poster}" alt="Front" crossorigin="anonymous">
          </div>
          <div class="dvd-face dvd-back">
            <div class="dvd-back-header">
              <span>Sortie : ${movie.Year.split(' ')[0]}</span>
              <span class="dvd-rating">★ ${movie.Rating}/10</span>
            </div>
            <div class="dvd-back-body">${movie.Plot}</div>
            <div class="dvd-back-meta">
              <strong>Réalisateur :</strong> ${movie.Director}<br>
              <strong>Acteurs :</strong> ${movie.Actors}
            </div>
            <div class="dvd-back-footer">
              DOLBY DIGITAL • INTERACTIVE MENU • REGION 2
            </div>
          </div>
          <div class="dvd-face dvd-spine-left">
            <div class="dvd-spine-text">${movie.Title}</div>
          </div>
          <div class="dvd-face dvd-spine-right"></div>
        </div>
      `;
      
      viewer.appendChild(container);
    }
  });
}

// NAVIGATION GESTUELLE PAR BALAYAGE (SWIPE / DRAG)
const viewerZone = document.getElementById("viewer");

viewerZone.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, {passive: true});
viewerZone.addEventListener("touchend", e => { touchEndX = e.changedTouches[0].clientX; handleSwipe(); }, {passive: true});

viewerZone.addEventListener("mousedown", e => { touchStartX = e.clientX; });
viewerZone.addEventListener("mouseup", e => { touchEndX = e.clientX; handleSwipe(); });

function handleSwipe() {
  const swipeSensitivity = 50;
  if (touchStartX - touchEndX > swipeSensitivity) next();
  if (touchEndX - touchStartX > swipeSensitivity) prev();
}

function toggleWatched(){ if(!movies.length) return; movies[currentIndex].watched=!movies[currentIndex].watched; save(); render(); }
function next(){ if(!movies.length) return; currentIndex=(currentIndex+1)%movies.length; render(); }
function prev(){ if(!movies.length) return; currentIndex=(currentIndex-1+movies.length)%movies.length; render(); }
function removeMovie(){ if(!movies.length) return; movies.splice(currentIndex,1); currentIndex = 0; save(); render(); }
function save(){ localStorage.setItem("movies",JSON.stringify(movies)); }

render();
</script>
</body>
</html>
